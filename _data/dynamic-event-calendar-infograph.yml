  - title: "Water Usage Calculator"
    image: "capstone/dynamic_event_calendar.png"
    link: "/capstone/dynamiceventcalendar/"
    alt: "Water Usage Calculator — Estimate Your Daily Water Consumption"
    keyPoints:
      - "Users input daily activities like shower time, laundry loads, and tooth brushing"
      - "Calculator estimates total daily water consumption using predefined averages"
      - "Breaks down water usage by individual activity for clear visualization"
      - "Provides personalized suggestions for reducing water waste"
      - "Predefined averages stored in a Flask database for organized calculation"
      - "Encourages sustainable habits through data-driven awareness"
    subtitle: "Know Your Usage. Change Your Habits."
    description: "Most people significantly underestimate how much water they use daily, making it difficult to adopt more sustainable habits. The Water Usage Calculator gives users a clear picture of their personal water footprint. Users enter information about their daily routines — shower duration, number of laundry loads, teeth brushing habits, and more. JavaScript processes these inputs against predefined water usage averages (e.g. gallons per minute of showering, gallons per load of laundry) to produce a total daily estimate with a breakdown by activity. The tool then surfaces targeted suggestions for reducing consumption, turning invisible habits into visible, actionable data."
    tech:
      - "HTML / CSS / JavaScript"
      - "Flask Database"
      - "Predefined Usage Averages"
      - "Dynamic Calculation Logic"
      - "GitHub Pages Deployment"
    impact:
      - "Educates users on their real daily water consumption"
      - "Identifies which household activities consume the most water"
      - "Provides specific, actionable tips for reducing water waste"
      - "Supports more sustainable everyday decision-making"
      - "Makes environmental impact visible and personally relevant"
    status: "In Development"
    team:
