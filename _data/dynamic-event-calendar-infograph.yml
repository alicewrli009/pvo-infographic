    alt: "Dynamic Event Calendar — Interactive Community Events for Safe Passage Heals"
    keyPoints:
      - "Interactive monthly calendar displaying all upcoming Safe Passage Heals events"
      - "Click any event to open a popup with flyer, description, date/time, and registration link"
      - "Replaces scattered static posts with one centralized, browsable interface"
      - "Frontend dynamically loads event data from a Flask REST API"
