  - title: "My Water Dashboard"
    image: "capstone/dynamic_event_calendar.png"
    link: "/capstone/dynamiceventcalendar/"
    alt: "My Water Dashboard — Personalized Water Insights by Location"
    keyPoints:
      - "Users enter their zip code to identify their local water district"
      - "Estimates monthly water usage from inputs like shower time and HVAC frequency"
      - "Displays real-time drought level and conservation alerts by region"
      - "Delivers personalized water-saving suggestions based on local conditions"
      - "Uses geocoding APIs to convert addresses to coordinates for district lookup"
      - "Water usage averages are specific to each city/state and stored in a database"
    subtitle: "Your Zip Code. Your Water Story."
    description: "While general water conservation tips are widely available, most users want personalized answers: Who is my water provider? How much do I actually use? How can I lower my bill? The My Water Dashboard answers all three in one place. Users enter their zip code and a few details about their daily habits — shower duration, heating and cooling frequency, and other usage patterns. A geocoding API converts their address into coordinates to identify their local water district. The system then calculates an estimated monthly water bill using city- and state-specific usage rates stored in the database, and surfaces drought alerts alongside tailored conservation suggestions — turning general awareness into personal action."
    tech:
      - "Geocoding API"
      - "Flask + SQLite"
      - "Pandas Data Visualization"
      - "JavaScript"
      - "City/State Usage Database"
      - "GitHub Pages Deployment"
    impact:
